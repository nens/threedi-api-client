      - subscribe
    WaterLevelProfile:
      type: object
      properties:
        url:
          type: string
          format: uri
      required:
      - url
    WaterLevelProfileRequest:
      type: object
      properties:
        geometry:
          title: Linestring
          description: Linestring geometry to use (geojson format)
          type: object
          required:
          - type
          - coordinates
          properties:
            type:
              title: type
              description: Type should always be 'linestring' or 'LINESTRING'
              type: string
              default: Linestring
            coordinates:
              title: coordinates
              description: List of coordinates. (longitude, latitude order)
              type: array
              items:
                type: array
                items:
                  type: number
                minItems: 2
                maxItems: 2
              minItems: 2
          example:
            type: LineString
            coordinates:
            - - 4.668275805499175
              - 52.619558913867856
            - - 4.73849433310911
              - 52.66453976184968
        points_limit:
          type: integer
          maximum: 200
          minimum: 1
          default: 100
          description: Maximum number of points to return
        subscribe:
          type: boolean
          description: Subscribe for new results during simulation
        subscribe_rate_limit:
          type: number
          format: double
          maximum: 1
          minimum: 0.25
          default: 0.5
          description: Max number of items per second for subscription
      required:
      - geometry
      - subscribe
    WaterQualityCustomizedResultArea:
      type: object
      description: |-
        A type of `ModelSerializer` that uses
        hyperlinked relationships with compound keys instead
        of primary key relationships.  Specifically:
        * A 'url' field is included instead of the 'id' field.
        * Relationships to other instances are hyperlinks, instead of primary keys.
        NOTE: this only works with DRF 3.1.0 and above.
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        name:
          type: string
          description: Name of the customized results area.
          maxLength: 255
        subsets:
          type: array
          items:
            $ref: '#/components/schemas/SubsetsEnum'
          description: 'Subsets of the customized results area. Valid subsets are:
            1D, 2D, 1D2D, GW.'
          maxItems: 4
        geometry:
          type: object
          properties:
            type:
              type: string
              enum:
              - Polygon
            coordinates:
              type: array
              items:
                type: array
                items:
                  type: array
                  items:
                    type: number
                    format: float
                  example:
                  - 12.9721
                  - 77.5933
                  minItems: 2
                  maxItems: 3
                example:
                - - 22.4707
                  - 70.0577
                - - 12.9721
                  - 77.5933
                minItems: 4
              example:
              - - - 0.0
                  - 0.0
                - - 0.0
                  - 50.0
                - - 50.0
                  - 50.0
                - - 50.0
                  - 0.0
                - - 0.0
                  - 0.0
          description: Geometry of the customized results area, WKT format, must be
            WGS84.
      required:
      - geometry
      - name
      - subsets
    WaterQualityOutputSettings:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        simulation_id:
          type: integer
          readOnly: true
        create_results:
          type: boolean
          description: Create domain wide results file.
        output_time_step:
          type: number
          format: double
          minimum: 1.0e-14
          nullable: true
          description: Output time step in seconds.
        output_start_time:
          type: number
          format: double
          minimum: 0.0
          description: Output start time in seconds.
        output_end_time:
          type: number
          format: double
          minimum: 1.0e-14
          description: Output end time in seconds.
        output_precision:
          allOf:
          - $ref: '#/components/schemas/OutputPrecisionEnum'
          description: |-
            Single or double precision output.

            * `1` - single
            * `2` - double
          minimum: -2147483648
          maximum: 2147483647
        customized_output_time_step:
          type: number
          format: double
          minimum: 1.0e-14
          nullable: true
          description: Customized output time step in seconds.
        customized_output_start_time:
          type: number
          format: double
          minimum: 0.0
          description: Customized output start time in seconds.
        customized_output_end_time:
          type: number
          format: double
          minimum: 1.0e-14
          description: Customized output end time in seconds.
        customized_output_precision:
          allOf:
          - $ref: '#/components/schemas/OutputPrecisionEnum'
          description: |-
            Single or double precision output for customized results.

            * `1` - single
            * `2` - double
          minimum: -2147483648
          maximum: 2147483647
    WaterQualitySettings:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        simulation_id:
          type: integer
          readOnly: true
        time_step:
          type: number
          format: double
          minimum: 1.0e-14
          description: Size of the water quality timestep in seconds.
        min_time_step:
          type: number
          format: double
          minimum: 1.0e-14
          nullable: true
          description: Minimum size of the water quality timestep in seconds. Suitable
            default is 0.001. Cannot be greater than hydrodynamic minimum timestep.
        max_time_step:
          type: number
          format: double
          minimum: 1.0e-14
          nullable: true
          description: Maximum size of the water quality timestep in seconds. Cannot
            be greater than hydrodynamic maximum timestep.
        general_numerical_threshold:
          type: number
          format: double
          minimum: 1.0e-14
          description: The numerical threshold for the water quality simulation.
        max_number_of_multi_step:
          type: integer
          maximum: 2147483647
          minimum: 1.0e-14
          description: The maximum number of steps used by the multi-step method.
        max_gs_sweep_iterations:
          type: integer
          maximum: 2147483647
          minimum: 1.0e-14
          description: The maximum number of iterations used by the Gauss-Seidel sweep
            method.
        convergence_eps:
          type: number
          format: double
          minimum: 1.0e-14
          description: The convergence epsilon for the water quality simulation.
    Waterdepth:
      type: object
