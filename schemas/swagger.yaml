      type: object
      properties:
        id:
          type: integer
          readOnly: true
        substance:
          type: string
          format: uri
        substance_id:
          type: integer
          readOnly: true
        substance_name:
          type: string
          readOnly: true
        concentrations:
          title: Timeseries
          description: 'Timeseries provided as a nested list. The inner list consists
            of exactly 2 values: timestamp, value'
          type: array
          items:
            type: array
            items:
              type: number
            description: Timestamp + value pair
            example:
            - 100
            - 0.5
            maxItems: 2
            minItems: 2
          example:
          - - 0
            - 0.1
          - - 100
            - 0.5
          - - 200
            - 0
          minItems: 1
          maxItems: 300
      required:
      - concentrations
      - substance
    ForcingSubstanceWithZone:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        substance:
          type: string
          format: uri
        substance_id:
          type: integer
          readOnly: true
        substance_name:
          type: string
          readOnly: true
        concentrations:
          title: Timeseries
          description: 'Timeseries provided as a nested list. The inner list consists
            of exactly 2 values: timestamp, value'
          type: array
          items:
            type: array
            items:
              type: number
            description: Timestamp + value pair
            example:
            - 100
            - 0.5
            maxItems: 2
            minItems: 2
          example:
          - - 0
            - 0.1
          - - 100
            - 0.5
          - - 200
            - 0
          minItems: 1
          maxItems: 300
        zone:
          title: Polygon
          description: Polygon specified in wkt or geojson, Coordinates in longitude,
            latitude order.
          type: object
          required:
          - type
          - coordinates
          properties:
            type:
              title: type
              description: Type should always be 'Polygon'
              type: string
              default: Polygon
            coordinates:
              title: coordinates
              description: List of coordinates (longitude, latitude order) in SRID
                4326.
              type: array
              items:
                type: array
                items:
                  type: array
                  items:
                    type: number
                  minItems: 2
                  maxItems: 2
                minItems: 3
              minItems: 1
              maxItems: 1
          example:
            type: Polygon
            coordinates:
            - - - 4.695281
                - 52.656047
              - - 4.683754
                - 52.655824
              - - 4.683253
                - 52.639063
              - - 4.695281
                - 52.656047
      required:
      - concentrations
      - substance
