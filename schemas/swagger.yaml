      description: |-
        A timed structure control allows for actively altering parameters of
        structures at a given point in time of the simulation for a given
        period of time.
        The ``type`` parameter specifies which action should be applied to
        the structure. Not all valid action types can be applied to every
        structure. An overview of valid combinations:

           set_discharge_coefficients: v2_orifice, v2_weir, v2_pipe,
                                       v2_channel, v2_culvert
           set_crest_level: v2_orifice, v2_weir
           set_pump_capacity: v2_pumpstation

        The value parameter must contain 1 value, except for the
        ``set_discharge_coefficients``action that expects a value for
        both flow directions.

        Example payload:

        ```
            {
              "offset": 0,
              "duration": 100,
              "value": [
                0.4, 0.8
              ],
              "type": "set_discharge_coefficients",
              "structure_id": 21,
              "structure_type": "v2_weir"
            }
        ```

        **v2_channel and v2_pipe are for internal use only. They expect a
        grid_id instead of a structure_id!**
