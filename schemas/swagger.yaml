        By default the results are sorted from newest to oldest.

        The reverse this order

        ```
            ?created
        ```
        In general it is possible to specify reverse orderings by prefixing
        the field name with '-', like so:

        ```
            ?-id
        ```
        Other fields that can be used to order the results are `name` and `id`.

        Several filter are available, for instance the creation date of
        the resource. Some usage examples:

        To get all simulation resources that have been created on
        Guido van Rossum's birthday

        ```
            ?created__date=1956-01-31
        ```

        To get all simulation resources that have been created during the
        1988 UEFA European Football Championship
        ```
           ?created__date__gte=1988-06-10&created__date__lte=1988-06-25
