  /v3/simulations/{simulation_pk}/events/boundaryconditions/file/:
    get:
      operationId: v3_simulations_events_boundaryconditions_file_list
      description: |-
        ViewMixin which adds an extra PUT-action 'processed'.

        Used by the api-workers event-validators to update the (asynchronous) validation
        results.
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: path
        name: simulation_pk
        schema:
          type: integer
        required: true
      tags:
      - v3
      security:
      - Bearer: []
      - OAuth2Bearer: []
      - ApiKeyBasic: []
      - Session: []
      - Basic: []
      - Bearer: []
      - OAuth2: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFileBoundaryConditionList'
          description: ''
    post:
      operationId: v3_simulations_events_boundaryconditions_file_create
      description: |-
        Endpoint for uploading a boundary-conditions file.

        The format of the filename should be <filename>.<extension>, e.g.

        `boundary_conditions_bergermeer.json`

        Every leading and trailing spaces will be removed. Other spaces are
        converted to underscores and anything that is not an alphanumeric, dash,
        underscore, or dot will be removed as well.

        The response provides a put_url which allows you to upload a file containing one
        or more boundary-conditions.

        The uploaded file should be a JSON-file containing an array of
        boundary-conditions timeseries.

        The file must contain a timeseries for each boundary condition in the
        threedimodel. This is validated after upload.

        Boundary-conditions need to be added before initializing/starting
        the simulation and cannot be changed once the simulation is
        initialized.

        Example
        -------

        **Notes**
        The ordering of the boundaries does not matter.

        ```
        [
            {
                "id": 1,   # sqlite boundary_1d table id
                "type": "1D",  # "1D" for 1d boundaries
                "interpolate": false,
                "values": [
                    [0, 0.5],
                    [500, 0,8],
                    [1000, 0]
                ]
            },
            {
                "id": 2,  # sqlite boundary_2d table id
                "type": "2D", # "2D" for 2d boundaries
                "interpolate": false,
                "values": [
                    [0, 0,3],
                    [400, 0.1]
                ]
            },
            {
                "id": 3,
                "type": "2D",
                "interpolate": false,
                "values": [
                    [0, -2.4],
                    [1300, 0,3],
                    [3000, 1.2],
                    [3600, 0]
                ]
            }
        ]
        ```

        Example with (water quality) substances. **Note**, the substance concentrations
        timesteps need to exactly match the boundary values timesteps
        (0, 500, 1000 in example below).
        ```
        [
            {
                "id": 1,   # sqlite boundary_1d table id
                "type": "1D",  # "1D" for 1d boundaries
                "interpolate": false,
                "values": [
                    [0, 0.5],
                    [500, 0,8],
                    [1000, 0]
                ]
                "substances": [
                    {
                        "substance": 1,
                        "interpolate": false,
                        "concentrations": [
                            [0, 0.1],
                            [500, 0.2],
                            [1000, 0]
                        ]
                    }
                ]
            }
        ]
        ```
      parameters:
      - in: path
        name: simulation_pk
        schema:
          type: integer
        required: true
      tags:
      - v3
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Upload'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Upload'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Upload'
        required: true
      security:
      - Bearer: []
      - OAuth2Bearer: []
      - ApiKeyBasic: []
      - Session: []
      - Basic: []
      - Bearer: []
      - OAuth2: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Upload'
          description: ''
