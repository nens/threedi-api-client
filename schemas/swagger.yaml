    PatchedAggregationSettings:
      type: object
      description: |-
        A type of `ModelSerializer` that uses
        hyperlinked relationships with compound keys instead
        of primary key relationships.  Specifically:
        * A 'url' field is included instead of the 'id' field.
        * Relationships to other instances are hyperlinks, instead of primary keys.
        NOTE: this only works with DRF 3.1.0 and above.
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        name:
          type: string
          nullable: true
          description: Give your aggregation setting a name to be able to find it
            back in the results file.
          maxLength: 120
        flow_variable:
          allOf:
          - $ref: '#/components/schemas/FlowVariableEnum'
          description: "Options: \nwater_level = Water Level\nflow_velocity = Flow
            Velocity\ndischarge = Discharge\nvolume = Volume\npump_discharge = Pump
            Discharge\nwet_cross_section = Wet Cross Section\nlateral_discharge =
            Lateral Discharge\nwet_surface = Wet Surface\nrain = Rain\nsimple_infiltration
            = Simple Infiltration\nleakage = Leakage\ninterception = Interception\nsurface_source_sink_discharge
            = Surface Source Sink Discharge\n\n\n* `water_level` - Water Level\n*
            `flow_velocity` - Flow Velocity\n* `discharge` - Discharge\n* `volume`
            - Volume\n* `pump_discharge` - Pump Discharge\n* `wet_cross_section` -
            Wet Cross Section\n* `lateral_discharge` - Lateral Discharge\n* `wet_surface`
            - Wet Surface\n* `rain` - Rain\n* `simple_infiltration` - Simple Infiltration\n*
            `leakage` - Leakage\n* `interception` - Interception\n* `surface_source_sink_discharge`
            - Surface Source Sink Discharge"
        method:
          allOf:
          - $ref: '#/components/schemas/MethodEnum'
          description: "Options: \nmin = minimum value of the variable in the configured
            interval\nmax = maximum value of the variable in the configured interval\navg
            = average value of the variable in the configured interval\ncum = variable
            integration over time [dt * variable]\ncum_positive = variable integration
            over time [dt * variable] in positive direction\ncum_negative = variable
            integration over time [dt * variable] in negative direction\ncurrent =
            current value of a variable\nsum = variable summation over configured
            interval\n\nNote: 'current' is required in case one checks the water balance
            for variables that are the result of the processes. Only valid for flow_variable
            'volume' and 'intercepted_volume'\n\n* `min` - minimum value of the variable
            in the configured interval\n* `max` - maximum value of the variable in
            the configured interval\n* `avg` - average value of the variable in the
            configured interval\n* `cum` - variable integration over time [dt * variable]\n*
            `cum_positive` - variable integration over time [dt * variable] in positive
            direction\n* `cum_negative` - variable integration over time [dt * variable]
            in negative direction\n* `current` - current value of a variable\n* `sum`
            - variable summation over configured interval"
        interval:
          type: number
          format: double
          description: aggregation interval in seconds
