      - websocket_url
    Wind:
      type: object
      description: |-
        Mixin for validating "offset" and "duration"
        Assumes simulation to be present on Serializer
      properties:
        id:
          type: integer
          readOnly: true
        uid:
          type: string
          format: uuid
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        simulation:
          type: string
          format: uri
          readOnly: true
        offset:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: offset of event in simulation in seconds
        values:
          type: array
          items:
            type: array
            items:
              type: number
              format: double
              title: Values
          description: '[time, speed, direction]'
          maxItems: 300
        units:
          allOf:
          - $ref: '#/components/schemas/WindSpeedUnitsEnum'
          description: |-
            wind speed unit (default 'm/s')

            * `m/s` - meter_per_second
            * `km/h` - kilometer_per_hour
        speed_interpolate:
          type: boolean
          readOnly: true
          description: interpolate wind speed
        speed_constant:
          type: boolean
          readOnly: true
          description: constant wind speed
        direction_interpolate:
          type: boolean
          readOnly: true
          description: interpolate wind direction
        direction_constant:
          type: boolean
          readOnly: true
          description: constant wind direction
      required:
      - offset
    WindDragCoefficient:
      type: object
      description: |-
        A type of `ModelSerializer` that uses
        hyperlinked relationships with compound keys instead
        of primary key relationships.  Specifically:
        * A 'url' field is included instead of the 'id' field.
        * Relationships to other instances are hyperlinks, instead of primary keys.
        NOTE: this only works with DRF 3.1.0 and above.
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        simulation:
          type: string
          format: uri
          readOnly: true
        value:
          type: number
          format: double
          maximum: 100
          minimum: 0
          description: global drag coefficient (0-100)
        uid:
          type: string
          format: uuid
          readOnly: true
        id:
          type: integer
          readOnly: true
    WindSpeedUnitsEnum:
      enum:
      - m/s
      - km/h
      type: string
      description: |-
        * `m/s` - meter_per_second
        * `km/h` - kilometer_per_hour
    settings:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        id:
          type: integer
          readOnly: true
        organisation:
          type: string
          title: Organisation.unique_id
          description: The unique_id of an organisation
        organisation_name:
          type: string
          readOnly: true
        historical_rain_radar_uuids:
          type: array
          items:
            type: string
            format: uuid
          description: List of historical rain radar UUIDs
        forecast_rain_radar_uuids:
          type: array
          items:
            type: string
            format: uuid
          description: List of forecast rain radar UUIDs
      required:
      - organisation
  securitySchemes:
    ApiKeyBasic:
      type: http
      scheme: basic
      description: Use username "__key__" with your API key as the password.
    Basic:
      type: http
      scheme: basic
      description: This scheme is for Personal API Keys. Use the key as password.
        The username must be '__key__' (the word 'key' enclosed in double underscores).
    Bearer:
      type: apiKey
      name: Authorization
      in: header
      description: This scheme is for tokens generated by 3Di. A token can be retrieved
        from auth/tokens.
    OAuth2:
      type: oauth2
      description: This scheme is for OAuth2 Bearer tokens. By default, a public client_id
        is set. Optionally supply another client id / secret (for testing).
      flows:
        authorizationCode:
          authorizationUrl: https://auth.lizard.net/oauth2/authorize
          tokenUrl: https://auth.lizard.net/oauth2/token
          scopes: {}
    OAuth2Bearer:
      type: http
      scheme: bearer
      bearerFormat: OAuth2
    Session:
      type: apiKey
      in: cookie
      name: sessionid
      description: Session authentication via cookie.
servers:
- url: https://api.3di.live
