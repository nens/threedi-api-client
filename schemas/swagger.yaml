      description: |-
        * `0` - off
        * `1` - momentum conservative
        * `2` - energy conservative
        * `3` - combined momentum and energy conservative
    UsePreconditionerCgEnum:
      enum:
      - 0
      - 1
      type: integer
      description: |-
        * `0` - off
        * `1` - standard
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        external_user_id:
          type: string
          nullable: true
          readOnly: true
      required:
      - username
    UserTokens:
      type: object
      properties:
        user:
          type: integer
        external_user_id:
          type: string
          description: The user ID in the external identity provider, which is present
            as the 'sub' field in tokens.
          maxLength: 255
        created:
          type: string
          format: date-time
          readOnly: true
        last_modified:
          type: string
          format: date-time
          readOnly: true
          description: The last time this remote user logged in.
        id_token:
          type: string
          description: The most recent ID token provided by the external identity
            provider.
        access_token:
          type: string
          description: The most recent access token provided by the external identity
            provider.
        refresh_token:
          type: string
          description: The most recent refresh token provided by the external identity
            provider.
      required:
      - external_user_id
      - user
    WaterFlowGraphRequest:
      type: object
      properties:
        start_time:
          type: integer
          minimum: 0
          description: simulation time in seconds
        history_points_limit:
          type: integer
          maximum: 500
          minimum: 1
          default: 200
          description: Maximum number of points of history to return
        subscribe:
          type: boolean
          description: Subscribe for new results during simulation
        subscribe_rate_limit:
          type: number
          format: double
          maximum: 2
          minimum: 0.25
          default: 0.5
          description: Max number of items per second for subscription
        line_id:
          type: integer
          minimum: 1
