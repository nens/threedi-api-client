  /v3/simulations/{simulation_pk}/actions/:
    post:
      operationId: v3_simulations_actions_create
      description: |-
        Post an action to the simulation to start, pause or end it.

        Example usage:

        To initialize a simulation (and pause)
        ```
        {"name": "initialize"}
        ```

        To initialize and directly run a simulation
        ```
        {"name": "start"}
        ```
        Also use "start" to resume a paused simulation.

        If you want to pause the simulation automatically after a given
        duration use the duration parameter
        ```
        {
          "name": "start",
          "duration": 2500
        }
        ```

        To pause a simulation
        ```
        {"name": "pause"}
        ```
        Please note: The simulation will automatically be shut down after the
        default timeout of 300 seconds has been reached. You can customize
        this value by specifying the timeout parameter
        ```
        {
          "name": "pause",
          "timeout": 999
        }
        ```

        To end a simulation
        ```
        {"name": "shutdown"}
        ```

        To queue a simulation
        ```
        {"name": "queue"}
        ```
        Queued simulations will be started as soon as a session spot becomes
        available. If a session spot is directly is available the simulation
        will also be started immediately. The response body will then contain
        `{"name": "start"}`
        ```
      parameters:
      - in: path
        name: simulation_pk
        schema:
          type: integer
        required: true
      tags:
      - v3
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Action'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Action'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Action'
        required: true
      security:
      - Bearer: []
      - OAuth2Bearer: []
      - ApiKeyBasic: []
      - Session: []
      - Basic: []
      - Bearer: []
      - OAuth2: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
          description: ''
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
          description: ''
        '400':
          description: Bad request
        '429':
          description: No available/free sessions
