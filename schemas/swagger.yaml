      - OAuth2: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInitialConcentrationList'
          description: ''
    post:
      operationId: v3_beta_threedimodels_initial_concentrations_create
      description: |-
        Add new initial concentrations

        ### Adding (extra) 1D initial concentrations
        Extra 1D initial concentrations can be added by posting:

        {"dimension": "one_d"}

        Using the 'id' value from the response, a JSON file needs to be uploaded via the
        PUT_URL retrieved from `initial_concentrations/{id}/upload/` in the following
        JSON format:

        Python code:

            import json
            file_contents = json.dumps({
                "node_ids": [node_id_1, node_id2, ....],
                "values" : [value_for_node_id_1, value_for_node_id_2, ...]
            })

            # Notes:
            # - Omitted values are considered dry.
            # - `node_ids` need to be sorted and unique
            # - Make sure that the positions of the node_id's and values match.

        ### Adding (extra) 2D initial substance concentrations
        2D initial concentrations can be added by uploading an
        'initial_concentration_file' Geotiff raster via `rasters/{id}/upload/`
        . This automatically triggers the creation of a 2D initial
        concentration. The source raster is linked as 'source_raster'. The values in the
         `source_raster` are aggregated per node using max, min and mean operators. The
        resulting values are stored in a file linked under `file`.
      parameters:
      - in: path
        name: threedimodel_pk
        schema:
          type: integer
        required: true
      tags:
      - v3-beta
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitialConcentration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InitialConcentration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InitialConcentration'
      security:
      - Bearer: []
      - OAuth2Bearer: []
      - ApiKeyBasic: []
      - Session: []
      - Basic: []
      - Bearer: []
      - OAuth2: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitialConcentration'
          description: ''
