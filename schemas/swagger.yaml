  /v3/simulations/from[-_]template/:
    post:
      operationId: v3_simulations_from[__]template_create
      description: |-
        Create a (new/cloned) simulation from a simulation template.

        There are two options to specify the desired duration for the
        new simulation, either by using the ``end_datetime`` **or** the
        ``duration`` parameter.

        {
          "template":                  # source simulation template resource id
          "name":                      # name for the new simulation.
          "tags":                      # extra tags, added to existing simulation template tags.
          "organisation":              # uuid of the organisation for which the
                                         simulation is run
          "start_datetime":            # datetime (in ISO 8601 (UTC) format) for the
                                         simulation start, e.g. "YYYY-MM-DDThh:mm:ss"
          "end_datetime":              # datetime (in ISO 8601 (UTC) format) for the
                                         simulation end, e.g. "YYYY-MM-DDThh:mm:ss"
          "duration":                  # in seconds, can be used instead of end_datetime
          "clone_events":              # if true, clone events like rain/sources & sinks etc.
          "clone_initials":            # if true, clone initial waterlevels
          "clone_settings":            # if true, clone simulation settings, like physical settings etc.
          "threedimodel_id":           # copy simulation template to threedimodel
          "started_from":              # platform from which the simulation was started
        }
      tags:
      - v3
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FromTemplate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FromTemplate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FromTemplate'
        required: true
      security:
      - Bearer: []
      - OAuth2Bearer: []
      - ApiKeyBasic: []
      - Session: []
      - Basic: []
      - Bearer: []
      - OAuth2: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Simulation'
          description: ''
        '400':
          description: validation errors
