  /v3/statuses/:
    get:
      operationId: v3_statuses_list
      description: |-
        Show the latest status off all simulations.

        List all simulations that ever have finished successfully

        ```
        ?name=finished
        ```

        List all simulations that have finished successfully during the week
        of the 1988 UEFA European Football Championship
        ```
        ?name=finished&created__date__gte=1988-06-10&created__date__lte=1988-06-25
        ```

        The `created` field is of type date-time in ISO 8601 (UTC) format. To
        get all crashed simulations since St Nicolas 2018

        ```
        ?name=crashed&created__gte=2018-12-05T00:00:00Z
