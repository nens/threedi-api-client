          type: number
          format: double
          maximum: 0.01
          minimum: 1.0e-13
          description: Threshold value for upwind scheme based on flow velocity, suitable
            default is 1e-06.
        friction_shallow_water_depth_correction:
          allOf:
          - $ref: '#/components/schemas/FrictionShallowWaterDepthCorrectionEnum'
          description: "In case the friction assumptions based on the dominant friction
            balance gives a structurally underestimation of the friction, you can
            switch this setting on.\n Options: \n0 = off\n1 = max between avg and
            divided channel based friction\n2 = always linearized\n3 = linearizes
            the depth based on a weighed averaged\n\n If options 3 is used the maximum
            depth of a thin layer needs to be defined. Do not use in combination with
            interflow. Suitable default is 0 (OFF).\n\n* `0` - off\n* `1` - max between
            avg and divided channel based friction\n* `2` - always linearized\n* `3`
            - linearizes the depth based on a weighed averaged"
          minimum: -2147483648
          maximum: 2147483647
        general_numerical_threshold:
          type: number
          format: double
          maximum: 1.0e-07
          minimum: 1.0e-13
          description: Suitable default is 1.0e-8
        time_integration_method:
          allOf:
          - $ref: '#/components/schemas/TimeIntegrationMethodEnum'
          description: "There are various methods to discretize the equations. At
            the moment only the first-order, semi-implicit method is supported and
            tested.\nOptions: \n0 = euler implicit\n\n\n* `0` - euler implicit"
          minimum: -2147483648
          maximum: 2147483647
        limiter_waterlevel_gradient_1d:
          allOf:
          - $ref: '#/components/schemas/UsePreconditionerCgEnum'
          description: |-
            The limiter on the water level gradient allows the model to deal with unrealistically steep gradients. Suitable default is 1.

            * `0` - off
            * `1` - standard
          minimum: -2147483648
          maximum: 2147483647
        limiter_waterlevel_gradient_2d:
          allOf:
          - $ref: '#/components/schemas/UsePreconditionerCgEnum'
          description: |-
            The limiter on the water level gradient allows the model to deal with unrealistically steep gradients. Suitable default is 1.

            * `0` - off
            * `1` - standard
          minimum: -2147483648
          maximum: 2147483647
        limiter_slope_crossectional_area_2d:
          allOf:
          - $ref: '#/components/schemas/LimiterSlopeCrossectionalArea2dEnum'
          description: "This limiter starts working in case the depth based on the
            downstream water level is zero and may be useful in sloping areas.\nOptions:
            \n0 = off\n1 = higher order scheme (might be sensitive to instabilities)\n2
            = cross-sections treated as upwind method volume/surface area\n3 = combination
            traditional method thin layer approach\n If option 3 is used the maximum
            depth of a thin layer needs to be defined. Do not use in combination with
            interflow.\n\n* `0` - off\n* `1` - higher order scheme (might be sensitive
            to instabilities)\n* `2` - cross-sections treated as upwind method volume/surface
            area\n* `3` - combination traditional method thin layer approach"
          minimum: -2147483648
          maximum: 2147483647
        limiter_slope_friction_2d:
          allOf:
          - $ref: '#/components/schemas/UsePreconditionerCgEnum'
          description: "This limiter starts working in case the depth based on the
            downstream water level is zero and may be useful in sloping areas. This
            limiter is mandatory if the limiter_slope_crossectional_area_2d setting
            is greater than 0. Do not use in combination with interflow. Suitable
            default is 0 (OFF)\n Options: \n0 = off\n1 = standard\n\n\n* `0` - off\n*
            `1` - standard"
          minimum: -2147483648
          maximum: 2147483647
        max_non_linear_newton_iterations:
          type: integer
          maximum: 2147483647
          minimum: 1
          description: Maximum number of non-linear newton iterations in single time
            step. Suitable default is 20.
        max_degree_gauss_seidel:
          type: integer
          maximum: 2147483647
          minimum: 1
          description: "Values below are advised for different model types: \n700
            for 1D flow \n7 for 1D and 2D flow \n5 for surface 2D flow only \n7 for
            surface and groundwater flow \n70 for 1D, 2D surface and groundwater flow
            or higher. \nPlay around with this value, can speed up your model significantly,
            especially in case of ground water flow. Suitable default is 0."
        min_friction_velocity:
          type: number
          format: double
          maximum: 1
          minimum: 0
          description: To guarantee some initial friction only in flooded areas and
            for large time steps, it is wise to assume a minimum velocity for computing
            the friction. Suitable default is 0.01.
        min_surface_area:
          type: number
          format: double
          maximum: 1.0e-07
          minimum: 1.0e-13
          description: Suitable default is 1.0e-8.
        use_preconditioner_cg:
          allOf:
          - $ref: '#/components/schemas/UsePreconditionerCgEnum'
          description: "Use pre-conditioner for matrix solver. Increases simulation
            speed in most cases. \nOptions: \n0 = off\n1 = standard\n. Suitable default
            is 1 (STANDARD).\n\n* `0` - off\n* `1` - standard"
          minimum: -2147483648
          maximum: 2147483647
        preissmann_slot:
          type: number
          format: double
          minimum: 0
          description: 'A conceptual vertical narrow slot providing a conceptual free
            surface condition for the flow when the water level is above the top of
            a closed conduit. Often used to guarantee stability. Not necessary in
            3Di even for pressurized pipe flow. Note: Works only for circular profiles.
            Suitable default is 0.0. Unit: m2.'
        limiter_slope_thin_water_layer:
          type: number
          format: double
          minimum: 0
          description: 'Mandatory when using friction_shallow_water_depth_correction
            option 3 or limiter_slope_crossectional_area_2d option 3. Unit: m'
        use_of_cg:
          type: integer
          maximum: 2147483647
          minimum: 1
          description: Number of conjugate gradient method iterations, before switching
            to another method. Suitable default is 20.
        use_nested_newton:
          type: boolean
          description: Set to 'True' for 1D calculations with closed profiles to handle
            non-linearity in volume-water level relation. When set to 'False' it will
            be used if calculations become non-linear. For sewerage systems it is
            advised to set this setting to 'True'. Otherwise a suitable default is
            'False'
        flooding_threshold:
          type: number
          format: double
          maximum: 0.05
          minimum: 0
          description: Water depth threshold for flow between 2D cells. Depth relative
            to lowest bathymetry pixel at the edge between two 2D cells. Suitable
            default is 0.000001.
    PatchedObstacleEdit:
      type: object
      description: |-
        Assumes simulation to be present on Serializer.

        Validates that the latest simulation status is either "created" or
        "initialized".

        If the latest simulation status is "initialized" is also checks
        if the simulation has been paused.

        Use this mixin to validate the creation or update of simulation event
        resources like rain, wind etc
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        simulation:
          type: string
          format: uri
          readOnly: true
        offset:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: offset of event in simulation in seconds
        value:
          type: number
          format: double
          description: Absolute or relative height (in meters)  to use for the linestring
        linestring:
          title: Linestring
          description: Linestring (epsg:4326) specified in wkt or geojson. Coordinates
            in longitude, latitude order.
          type: object
          required:
          - type
          - coordinates
          properties:
            type:
              title: type
              description: Type should always be 'linestring' or 'LINESTRING'
              type: string
              default: Linestring
            coordinates:
              title: coordinates
              description: List of coordinates. (longitude, latitude order)
              type: array
              items:
                type: array
                items:
                  type: number
                minItems: 2
                maxItems: 2
              minItems: 2
          example:
            type: LineString
            coordinates:
            - - 4.668275805499175
              - 52.619558913867856
            - - 4.73849433310911
              - 52.66453976184968
        state:
          allOf:
          - $ref: '#/components/schemas/EventStateEnum'
          readOnly: true
        state_detail:
          readOnly: true
          nullable: true
        uid:
          type: string
          format: uuid
          readOnly: true
        id:
          type: integer
          readOnly: true
