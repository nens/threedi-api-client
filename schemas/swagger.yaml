    RasterEdit:
      type: object
      description: |-
        Assumes simulation to be present on Serializer.

        Validates that the latest simulation status is either "created" or
        "initialized".

        If the latest simulation status is "initialized" is also checks
        if the simulation has been paused.

        Use this mixin to validate the creation or update of simulation event
        resources like rain, wind etc
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        simulation:
          type: string
          format: uri
          readOnly: true
        raster:
          type: string
          format: uri
        offset:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: offset of event in simulation in seconds
        value:
          type: number
          format: double
          description: Absolute or relative height (in meters)  to use for the polygon
        polygon:
          title: Polygon
          description: Polygon specified in wkt or geojson, Coordinates in longitude,
            latitude order.
          type: object
          required:
          - type
          - coordinates
          properties:
            type:
              title: type
              description: Type should always be 'Polygon'
              type: string
              default: Polygon
            coordinates:
              title: coordinates
              description: List of coordinates (longitude, latitude order) in SRID
                4326.
              type: array
              items:
                type: array
                items:
                  type: array
                  items:
                    type: number
                  minItems: 2
                  maxItems: 2
                minItems: 3
              minItems: 1
              maxItems: 1
          example:
            type: Polygon
            coordinates:
            - - - 4.695281
                - 52.656047
              - - 4.683754
                - 52.655824
              - - 4.683253
                - 52.639063
              - - 4.695281
                - 52.656047
        relative:
          type: boolean
          description: Process the value as a relative height, default is absolute
        uid:
          type: string
          format: uuid
          readOnly: true
        id:
          type: integer
          readOnly: true
      required:
      - offset
      - polygon
      - raster
      - value
