            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTimeseriesWindList'
          description: ''
    post:
      operationId: v3_simulations_events_wind_timeseries_create
      description: |-
        Same as constant wind event but now without separate fields
        for ``speed_value`` and ``direction_value``.
        Instead - to avoid time-mapping issues - the field ``values``
        holds the speed and direction values:
        ```
        [
            [time, speed1, direction1],
            [time, speed2, direction2],
        ]
        ```

        example payload:
        ```
        {
            "offset": 2,
            "values": [
                [0, 40, 180],
                [60, 35, 181]
            ],
            "units": "m/s",
        }
        ```

        becomes an Timeseries object with values:
        ```
        {
            "values": [
                [ 0, 40, 180 ],
                [60, 35, 181 ]
            ]
        }
        ```
      parameters:
      - in: path
        name: simulation_pk
        schema:
          type: integer
        required: true
      tags:
      - v3
      requestBody:
        content:
          application/json:
            schema:
