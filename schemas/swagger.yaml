      - ApiKeyBasic: []
      - Session: []
      - Basic: []
      - Bearer: []
      - OAuth2: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBulkTimeseriesRainList'
          description: ''
    post:
      operationId: v3_beta_simulations_events_rain_timeseries_file_create
      description: |-
        Endpoint for uploading a file with one or more timeseries rain events.

        The format of the filename should be `<filename>.json`, e.g. `timeseries_rain.json`

        Every leading and trailing spaces will be removed. Other spaces are
        converted to underscores and anything that is not an alphanumeric, dash,
        underscore, or dot will be removed as well.

        The response provides a put_url which allows you to upload a file containing
        the rain events. These events should either be a constant- or a
        timeseries-rain, or a combination of both. See their respective endpoints for
        the required fields.

        The uploaded file should be a JSON-file containing an array of rain events.
        Example of the content of such a file:
        ```
        [
          {
            "offset": 100,
            "value": 0.05,
            "duration": 300,
            "units": "m3/s",
          },
          {
            "offset": 180,
            "interpolate": false,
            "values": [
              [0.0, 0.0002],
              [900.0, 0.0],
              [1200.0, 0.0001],
              [1620.0, 0.0]
            ],
            "units": "m3/s",
          },
          {
            "offset": 200,
            "values": [[0, 0.05], [3600, 0.0]],
            "duration": 400,
            "units": "mm/h",
            "substances": [
              {
                "substance": 1,
                "concentrations": [[0, 0.0001], [3600, 0.0]]
              },
              {
                "substance": 2,
                "concentrations": [[0, 0.0002], [3600, 0.0]]
                "zone": {
                  "type": "Polygon",
                  "coordinates": [
                    [
                      [5.1152647, 52.0929945],
                      [5.1152376, 52.0925619],
                      [5.1164597, 52.0924375],
                      [5.1165030, 52.0930215],
                      [5.1152647, 52.0929945]
                    ],
                  ]
                }
              }
            ]
          }
        ]
        ```
        Substances can be applied to a zone within the rain event. The zone should be a
        GeoJSON polygon with coordinates in the EPSG-code specified in the
        `epsg_code`. If no `epsg_code` is specified, EPSG:4326 is assumed. The polygon
        will be intersected with the edges of nodes in the grid to determine which nodes
        receive the substance load. So nodes are either fully in or out of the polygon.

        The `offset` of this file event will be added to each individual
        rain event offset in the uploaded file.

        **Note**: the substance concentrations
        timesteps need to exactly match the rain event values timesteps
      parameters:
      - in: path
        name: simulation_pk
        schema:
          type: integer
        required: true
      tags:
      - v3-beta
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadBulkTimeseriesRainFile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UploadBulkTimeseriesRainFile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadBulkTimeseriesRainFile'
        required: true
      security:
      - Bearer: []
      - OAuth2Bearer: []
