        the `value` and `duration` of a constant-event into a timeseries similar as a
        timeseries event.

        The timeseries will look as following:
        `values = [[0, value], [duration, 0]]`

        Requires the fields:
        - interpolate
        - constant
        - value
        - values
        - duration
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        simulation:
          type: string
          format: uri
          readOnly: true
        offset:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: offset of event in simulation in seconds
        duration:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
          title: Duration (in seconds)
          description: event duration in seconds. -9999 is the 'infinite duration'
            value (only allowed in conjunction with infinite simulations
        value:
          type: number
          format: double
          description: Rain intensity
        units:
          allOf:
          - $ref: '#/components/schemas/TimeseriesRainMsUnitEnum'
          description: |-
            m/s is only option for now

            * `m/s` - m/s
        uid:
          type: string
          format: uuid
          readOnly: true
        id:
          type: integer
          readOnly: true
        substances:
          type: array
          items:
            $ref: '#/components/schemas/ForcingSubstanceWithZone'
      required:
      - duration
      - offset
      - units
      - value
    ConstantSourcesSinks:
      type: object
      description: |-
        EventMixin which converts a timeseries-event into a contstant-event.

        Behind the scenes constant and timeseries are the same but shown to the user as 2
        different types for ease of configuration.
        In a constant-event the user provides a `value` and `duration`, whereas in a
        timeseries-event the user provides nested array as `values`. This mixin converts
        the `value` and `duration` of a constant-event into a timeseries similar as a
        timeseries event.

        The timeseries will look as following:
        `values = [[0, value], [duration, 0]]`

        Requires the fields:
        - interpolate
        - constant
        - value
        - values
        - duration
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        simulation:
          type: string
          format: uri
          readOnly: true
        offset:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: offset of event in simulation in seconds
        duration:
          type: integer
        value:
          type: number
          format: double
        units:
          allOf:
          - $ref: '#/components/schemas/TimeseriesRainMsUnitEnum'
          description: |-
            'm/s' (only option for now)

            * `m/s` - m/s
        uid:
          type: string
          format: uuid
          readOnly: true
        id:
          type: integer
          readOnly: true
        substances:
          type: array
          items:
            $ref: '#/components/schemas/ForcingSubstance'
      required:
      - duration
      - offset
      - units
      - value
    ConstantWind:
      type: object
      description: |-
        Mixin for validating "offset" and "duration"
        Assumes simulation to be present on Serializer
      properties:
        id:
          type: integer
          readOnly: true
        uid:
          type: string
          format: uuid
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        simulation:
          type: string
          format: uri
          readOnly: true
        offset:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: offset of event in simulation in seconds
        duration:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
          title: Duration (in seconds)
          description: event duration in seconds. -9999 is the 'infinite duration'
            value (only allowed in conjunction with infinite simulations
        values:
          type: array
          items:
            type: array
            items:
              type: number
              format: double
              title: Values
          readOnly: true
          description: '[time, speed, direction]'
        units:
          allOf:
          - $ref: '#/components/schemas/WindSpeedUnitsEnum'
          description: |-
            wind speed unit (default 'm/s')

            * `m/s` - meter_per_second
            * `km/h` - kilometer_per_hour
        speed_interpolate:
          type: boolean
          readOnly: true
          description: interpolate wind speed
        speed_constant:
          type: boolean
          readOnly: true
          description: constant wind speed
        direction_interpolate:
          type: boolean
          readOnly: true
          description: interpolate wind direction
        direction_constant:
          type: boolean
          readOnly: true
          description: constant wind direction
        speed_value:
          type: number
          format: double
          minimum: 0
          description: constant wind speed
        direction_value:
          type: integer
          maximum: 360
          minimum: 0
          description: constant wind direction in degrees (0-360) from north - meteorological
            standard (thus, 180 is a southern wind)
      required:
      - offset
