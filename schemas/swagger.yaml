  /v3/simulations/{simulation_pk}/events/lateral/file/:
    get:
      operationId: v3_simulations_events_lateral_file_list
      description: |-
        ViewMixin which adds an extra PUT-action 'processed'.

        Used by the api-workers event-validators to update the (asynchronous) validation
        results.
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: path
        name: simulation_pk
        schema:
          type: integer
        required: true
      tags:
      - v3
      security:
      - Bearer: []
      - OAuth2Bearer: []
      - ApiKeyBasic: []
      - Session: []
      - Basic: []
      - Bearer: []
      - OAuth2: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFileLateralList'
          description: ''
    post:
      operationId: v3_simulations_events_lateral_file_create
      description: |-
        Endpoint for uploading a file with one or more laterals.

        The format of the filename should be `<filename>.<extension>`, e.g.

        `laterals_bergermeer.json`

        Every leading and trailing spaces will be removed. Other spaces are
        converted to underscores and anything that is not an alphanumeric, dash,
        underscore, or dot will be removed as well.

        The response provides a put_url which allows you to upload a file containing one
        or more laterals. These laterals should either be a constant- or a
        timeseries-lateral, or a combination of both. See their respective endpoint for
        the required fields of these laterals.

        The uploaded file should be a JSON-file containing an array of laterals. Example
        of the content of such a file:
        ```
        [
          {
            "offset": 100,
            "value": 0.05,
            "duration": 300,
            "units": "m3/s",
            "connection_node": 5
          },
          {
            "offset": 180,
            "interpolate": false,
            "values": [
              [0.0, 0.0002],
              [900.0, 0.0],
              [1200.0, 0.0001],
              [1620.0, 0.0]
            ],
            "units": "m3/s",
            "connection_node": 4
          },
          {
            "offset": 0,
            "value": 0.03,
            "duration": 500,
            "units": "m3/s",
            "point": {
              "type": "Point",
              "coordinates": [4.70184629, 52.62586862]   #  longitude, latitude
            }
          }
        ]
        ```

        The `offset` of this file-lateral-event will be applied to each individual
        lateral offset in the uploaded file

        If the `periodic` field is set to `daily` the values given are used for every hour of
        every day in the simulation. Exactly 25 (0-24) timeseries per entry are required like such:
              "values": [
                [0.0, 0.0002],
                [3600, 0.01],
                .....
                <SNIP>
                .....
                [82800, 0.15]  # 3600.0 * 23
                [86400, 0.0]   # 3600.0 * 24
              ]

        Only laterals with 'values' are allowed in this case.

        The **hour** (not minutes or seconds) of the simulation `start_datetime` (UTC) is taken into consideration for the first timeseries value to use.
        Periodic laterals are intended for dry weather flow.

        Example with (water quality) substances. **Note**: the substance concentrations
        timesteps need to exactly match the lateral values timesteps
        (0, 300 in example below).
        ```
        [
          {
            "offset": 100,
            "values": [[0, 0.05], [300, 0]],
            "units": "m3/s",
            "connection_node": 5,
            "substances": [
                {"substance": 1, "concentrations": [[0, 0.1], [300, 0]]}
            ]
          }
        ]
        ```
      parameters:
      - in: path
        name: simulation_pk
        schema:
          type: integer
        required: true
      tags:
      - v3
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadLateralFile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UploadLateralFile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadLateralFile'
        required: true
      security:
      - Bearer: []
      - OAuth2Bearer: []
      - ApiKeyBasic: []
      - Session: []
      - Basic: []
      - Bearer: []
      - OAuth2: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadLateralFile'
          description: ''
