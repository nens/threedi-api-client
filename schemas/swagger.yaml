      - Bearer: []
      - OAuth2: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFileStructureControlList'
          description: ''
    post:
      operationId: v3_simulations_events_structure_control_file_create
      description: |-
        Endpoint for uploading a file with one or more structure controls.

        The supplied filename should be include the extension, for example "bergermeer_controls.json".

        `bergermeer_controls.json`

        The response provides a put_url which may be used to upload a file containing one
        or more controls. These controls are divided in memory, table and timed
        structure controls. See the respective endpoints for
        the required fields of these controls.

        The uploaded file should be a JSON-file containing an array of controls per control type. Example
        of the content of such a file:
        ```
        {
            "timed": [
                {
                    "offset": 0,
                    "duration": 100,
                    "value": [
                        0.4, 0.8
                    ],
                    "type": "set_discharge_coefficients",
                    "structure_id": 21,
                    "structure_type": "v2_weir"
                }
            ],
            "memory": [
                {
                    "offset": 0,
                    "duration": 3600,
                    "measure_specification": {
                        "name": "Measurement location",
                        "locations": [
                            {
                                "weight": "1.00",
                                "content_type": "v2_connection_node",
                                "content_pk": 356,
                            }
                        ],
                        "variable": "s1",
                        "operator": "<"
                    },
                    "structure_id": 10250,
                    "structure_type": "v2_weir",
                    "type": "set_crest_level",
                    "value": [
                        9.05
                    ],
                    "upper_threshold": 0.3,
                    "lower_threshold": 0.1,
                    "is_active": false,
                    "is_inverse": false
                }
            ],
            "table": [
                {
                    "offset": 0,
                    "duration": 3600,
                    "measure_specification": {
                        "name": "Measurement location",
                        "locations": [
                            {
                                "weight": "1.00",
                                "content_type": "v2_connection_node",
                                "content_pk": 356,
                            }
                        ],
                        "variable": "s1",
                        "operator": "<"
                    },
                    "structure_id": 10249,
                    "structure_type": "v2_weir",
                    "type": "set_crest_level",
                    "values": [
                        [
                            9.05,
                            -1.45
                        ],
                    ]
                }
            ]
        }
        ```

        If there are only controls of one category, the other arrays can be omitted, like for example:
        ```
        {
            "timed": [
                {
                    "offset": 0,
                    "duration": 100,
                    "value": [
                        0.4, 0.8
                    ],
                    "type": "set_discharge_coefficients",
                    "structure_id": 21,
                    "structure_type": "v2_weir"
                }
            ]
        }
        ```

        The `offset` supplied in the request body will be applied on top of each individual
        structure control offset in the uploaded file.
      parameters:
      - in: path
        name: simulation_pk
        schema:
          type: integer
        required: true
      tags:
      - v3
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadEventFile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UploadEventFile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadEventFile'
        required: true
      security:
      - Bearer: []
      - OAuth2Bearer: []
      - ApiKeyBasic: []
      - Session: []
      - Basic: []
      - Bearer: []
      - OAuth2: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadEventFile'
          description: ''
