  /v3/schematisations/{schematisation_pk}/revisions/{id}/commit/:
    post:
      operationId: v3_schematisations_revisions_commit_create
      description: |-
        Commit the revision

        The `commit_message` can be used to describe the changes.

        The `force_as` parameter allows to override the default behaviour
        of committing the revision with the already assigned revision number.

        In case another user has already committed a revision with the same
        number, an HTTP 409 status code is returned.

        In this case you can either:
        1) Save the revision with a higher revision number using
           `force_as` = `new_revision`, effectively overwriting changes
           from the other user.
        2) Save the revision under a new schematisation using
           `force_as` = `new_schematisation` and specifying
           a `schematisation_name`.

        If you want to merge your changes with the changes from the
        other user, you need to download his/hers revision locally and merge
        it yourselves.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this revision.
        required: true
      - in: path
        name: schematisation_pk
        schema:
          type: integer
        required: true
      tags:
      - v3
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Commit'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Commit'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Commit'
      security:
      - Bearer: []
      - OAuth2Bearer: []
      - ApiKeyBasic: []
      - Session: []
      - Basic: []
      - Bearer: []
      - OAuth2: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchematisationRevision'
          description: ''
        '409':
          description: Conflict with other revision already committed
