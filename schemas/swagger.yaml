  /v3/threedimodels/{threedimodel_pk}/initial_waterlevels/:
    get:
      operationId: v3_threedimodels_initial_waterlevels_list
      description: |-
        ## Description
        Initial waterlevels on threedimodels can be used in a simulation to specify the initial
        waterlevels on the 1D and/or 2D domain.

        ### Initial waterlevels from schematisation
        1D and 2D initial waterlevels in the schematisation are automatically picked up
        during the creation of the threedimodel.
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: path
        name: threedimodel_pk
        schema:
          type: integer
        required: true
      tags:
      - v3
      security:
      - Bearer: []
      - OAuth2Bearer: []
      - ApiKeyBasic: []
      - Session: []
      - Basic: []
      - Bearer: []
      - OAuth2: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInitialWaterlevelList'
          description: ''
    post:
      operationId: v3_threedimodels_initial_waterlevels_create
      description: |-
        Add new initial waterlevels

        ### Adding (extra) 1D initial waterlevels
        Extra 1D initial waterlevels can be added by posting:

        {"dimension": "one_d"}

        Using the 'id' value from the response, a JSON file needs to be uploaded via the PUT_URL retrieved from
        `initial_waterlevels/{id}/upload/` in the following JSON format:

        Python code:

            import json
            file_contents = json.dumps({
                "node_ids": [node_id_1, node_id2, ....],
                "values" : [value_for_node_id_1, value_for_node_id_2, ...]
            })

            # Notes:
            # - Omitted values are considered dry.
            # - `node_ids` need to be sorted and unique
            # - Make sure that the positions of the node_id's and values match.

        ### Adding (extra) 2D initial waterlevels
        2D initial waterlevels can be added by uploading an 'initial_waterlevel_file' Geotiff raster via `rasters/{id}/upload/`.
        This automatically triggers the creation of a 2D initial waterlevel. The source raster is
        linked as 'source_raster'. The values in the `source_raster` are aggregated per node using
        max, min and mean operators. The resulting values are stored in a file linked under `file`.
      parameters:
      - in: path
        name: threedimodel_pk
        schema:
          type: integer
        required: true
      tags:
      - v3
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitialWaterlevel'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InitialWaterlevel'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InitialWaterlevel'
      security:
      - Bearer: []
      - OAuth2Bearer: []
      - ApiKeyBasic: []
      - Session: []
      - Basic: []
      - Bearer: []
      - OAuth2: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitialWaterlevel'
          description: ''
