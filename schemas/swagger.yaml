    post:
      operationId: v3_simulation[__]templates_create
      description: |-
        Create a (optionally cloned) simulation template from the given simulation.

        A simulation template is actually nothing more than a simulation with a special status.
        It's immutable after creation and only can be used to create new simulations.

        Simulations 'upgraded' to simulations templates can't be directly run. The 'from_template' endpoint
        allows to create a new simulation from a template in a runnable state.

        A simulation template can be changed by first creating a simulation from it with 'from_template'.
        Changing that simulation and use this endpoint to 'upgrade' it to a simulation template.

        Note: A clone of a simulation is created if the simulation is not in the 'created' state.
        Otherwise the simulation in 'created' state is 'upgraded' to a simulation template.

        The limit for the number of templates per Threedimodel is 50.
      tags:
      - v3
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateTemplate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateTemplate'
        required: true
      security:
      - Bearer: []
      - OAuth2Bearer: []
      - ApiKeyBasic: []
      - Session: []
      - Basic: []
      - Bearer: []
      - OAuth2: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
          description: ''
        '400':
          description: validation errors
