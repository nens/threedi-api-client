components:
  schemas:
    Action:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/ActionNameEnum'
        duration:
          type: integer
          minimum: 1
          description: Only valid for name='start'. Run simulation for given duration
            (in seconds) and pause
        timeout:
          type: integer
          minimum: 30
          default: 300
          description: Only valid for name='pause'. Remove simulation after given
            timeout (in seconds). Defaults to 300 seconds
        max_rate:
          type: number
          format: double
          minimum: 1
          description: 'Only valid for name=''start''. Limit maximum speed of the
            simulation. The max_rate is a multiplier relative to real time For example
            max_rate ''60'' means max 60 simulation seconds in 1 real second '
        compute_cluster:
          type: string
          title: ComputeCluster.name
          description: 'Only valid for name values: ''start'', ''initialize'' or ''queue''
            Compute cluster to start the session. If ommitted the first available
            cluster is used, starting with the default cluster.'
        simulation_runner:
          allOf:
          - $ref: '#/components/schemas/SimulationRunnerEnum'
          description: |-
            Only allowed for name values: 'start', 'initialize' or 'queue Simulation runner version used to execute the simulation. If not filled in the default version is used. (Note: used for testing new calccore releases on the staging environment. On production only the default version can be picked)

            * `3.4.104-3.7.2` - 3.4.104-3.7.2
            * `3.2.17-2.3.6` - 3.2.17-2.3.6
      required:
      - name
    ActionNameEnum:
      enum:
      - initialize
      - start
      - pause
      - shutdown
      - queue
      - dequeue
      type: string
      description: |-
        * `initialize` - initialize
        * `start` - start
        * `pause` - pause
        * `shutdown` - shutdown
        * `queue` - queue
        * `dequeue` - dequeue
    AddUser:
