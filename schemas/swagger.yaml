    CustomizedResultArea:
      type: object
      description: |-
        A type of `ModelSerializer` that uses
        hyperlinked relationships with compound keys instead
        of primary key relationships.  Specifically:
        * A 'url' field is included instead of the 'id' field.
        * Relationships to other instances are hyperlinks, instead of primary keys.
        NOTE: this only works with DRF 3.1.0 and above.
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        name:
          type: string
          description: Name of the customized results area.
          maxLength: 255
        subsets:
          type: array
          items:
            $ref: '#/components/schemas/SubsetsEnum'
          description: The subsets for which the customized results area is defined.
        geometry:
          type: object
          properties:
            type:
              type: string
              enum:
              - Polygon
            coordinates:
              type: array
              items:
                type: array
                items:
                  type: array
                  items:
                    type: number
                    format: float
                  example:
                  - 12.9721
                  - 77.5933
                  minItems: 2
                  maxItems: 3
                example:
                - - 22.4707
                  - 70.0577
                - - 12.9721
                  - 77.5933
                minItems: 4
              example:
              - - - 0.0
                  - 0.0
                - - 0.0
                  - 50.0
                - - 50.0
                  - 50.0
                - - 50.0
                  - 0.0
                - - 0.0
                  - 0.0
          description: The polygon of the customized results area in WKT format, must
            be WGS84.
      required:
      - geometry
      - name
      - subsets
