    post:
      operationId: v3_simulations_visualisations_breach_graph_create
      description: |-
        Get a websocket URL returning breaches (graph) data

        The websocket-url in the response returns binary data
        messages consisting of timestamp, breach_width,
        breach_depth, q (discharge), au (wet cross-sectional area)
        as float32 data.

        The values are alternated like:
        [timestamp, breach_width, breach_depth, q, au ...
         timestamp_N, breach_width_N, breach_depth_N, q_N, au_N]
