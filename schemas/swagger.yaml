    PatchedConstantLateral:
      type: object
      description: |-
        EventMixin which converts a timeseries-event into a contstant-event.

        Behind the scenes constant and timeseries are the same but shown to the user as 2
        different types for ease of configuration.
        In a constant-event the user provides a `value` and `duration`, whereas in a
        timeseries-event the user provides nested array as `values`. This mixin converts
        the `value` and `duration` of a constant-event into a timeseries similar as a
        timeseries event.

        The timeseries will look as following:
        `values = [[0, value], [duration, 0]]`

        Requires the fields:
        - interpolate
        - constant
        - value
        - values
        - duration
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        simulation:
          type: string
          format: uri
          readOnly: true
        offset:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: offset of event in simulation in seconds
        duration:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
          title: Duration (in seconds)
          description: event duration in seconds. -9999 is the 'infinite duration'
            value (only allowed in conjunction with infinite simulations
        value:
          type: number
          format: double
        units:
          allOf:
          - $ref: '#/components/schemas/LateralUnitsEnum'
          description: |-
            'm3/s' (only option for now)

            * `m3/s` - m3/s
        point:
          title: Point
          description: Point specified in wkt or geojson. Coordinates in longitude,
            latitude order.
          type: object
          required:
          - type
          - coordinates
          properties:
            type:
              title: type
              description: Type should always be 'Point'
              type: string
              default: Point
            coordinates:
              title: coordinates
              description: List of exactly one coordinate (longitude, latitude order)
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 2
          example:
            type: Point
            coordinates:
            - 4.695281
            - 52.656047
        connection_node:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        state:
          allOf:
          - $ref: '#/components/schemas/EventStateEnum'
          readOnly: true
        state_detail:
          readOnly: true
          nullable: true
        grid_id:
          type: integer
          readOnly: true
          nullable: true
        uid:
          type: string
          format: uuid
          readOnly: true
        id:
          type: integer
          readOnly: true
        substances:
          type: array
          items:
            $ref: '#/components/schemas/ForcingSubstance'
