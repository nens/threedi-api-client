  /v3/auth/token/:
    post:
      operationId: v3_auth_token_create
      description: |-
        Retrieve tokens for API authentication.

        There are two ways for retrieving a tokens. The preferred way is attaching
        a Personal API Key to the request and leave the request body empty. For
        backwards compatibility, you can also supply your username and password
        in the request body directly.

        The response will contain an "access" and "refresh" JWT token.

        The "access" token needs to be sent as HTTP authentication header
        with every request with a 'Bearer ' prefix (case-sensitive).

        Note that the "access" token expires after some time.

        The "refresh" token can be used to get a new access token
        via the "refresh" endpoint.
      tags:
      - v3
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Authenticate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Authenticate'
          multipart/form-data:
            schema:
