    get:
      operationId: v3_simulations_results_post_processing_lizard_arrival_list
      description: |-
        A Custom ViewSet for creating, listing or deleting an
        ArrivalTimePostProcessing resource. It includes a custom destroy
        action (with detail=False) as a BasicPostProcessing object can
        have only one ArrivalTimePostProcessing object. An
        ArrivalTimePostProcessing resource is created with an empty POST.

        Three conditions are validated when creating an resource:
        - The simulation may not already have an ArrivalTimePostProcessing resource.
        - The simulation must have a BasicPostProcessing resource with 'process_basic_results'=True.
        - Lizard may not already have been triggered to processing this simulation.
      parameters:
      - name: limit
        required: false
