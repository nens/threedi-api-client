  /v3-beta/simulation-templates/{id}/copy-to-threedimodel/:
    post:
      operationId: v3_beta_simulation_templates_copy_to_threedimodel_create
      description: |-
        Copy simulation template to a threedimodel.

        {
            "threedimodel": ThreediModel id
            "name": name for the new template
            "tags": extra tags, added to existing simulation template tags
            "clone_events": clone events like rain/sources & sinks etc
            "clone_initials": clone initial waterlevels & concentrations
            "clone_settings": clone simulation settings, like physical settings etc
        }
